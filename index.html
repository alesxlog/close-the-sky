<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Close The Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #gameCanvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto; height: auto;
      image-rendering: pixelated;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1280" height="1280"></canvas>

  <!-- Tuning -->
  <script src="config/tuning.js"></script>

  <!-- Config -->
  <script src="config/waves.js"></script>
  <script src="config/intel.js"></script>
  <script src="config/config.js"></script>

  <!-- Utils -->
  <script src="utils/input.js"></script>
  <script src="utils/spawner.js"></script>
  <script src="utils/collision.js"></script>
  <script src="utils/logger.js"></script>

  <!-- Entities -->
  <script src="entities/player.js"></script>
  <script src="entities/enemies.js"></script>
  <script src="entities/projectiles.js"></script>
  <script src="entities/explosion.js"></script>

  <!-- UI -->
  <script src="ui/TabletUI.js"></script>

  <!-- Scenes -->
  <script src="scenes/SceneBase.js"></script>
  <script src="scenes/background.js"></script>
  <script src="scenes/hud.js"></script>
  <script src="scenes/menuScene.js"></script>
  <script src="scenes/pauseScene.js"></script>
  <script src="scenes/gameOverScene.js"></script>
  <script src="scenes/missionBriefScene.js"></script>
  <script src="scenes/aarScene.js"></script>
  <script src="scenes/upgradeStationScene.js"></script>
  <script src="scenes/gameScene.js"></script>

  <script>
    window.addEventListener('load', () => {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      function scaleCanvas() {
        const scale = Math.min(
          window.innerWidth  / CONFIG.CANVAS.WIDTH,
          window.innerHeight / CONFIG.CANVAS.HEIGHT
        );
        canvas.style.width  = (CONFIG.CANVAS.WIDTH  * scale) + 'px';
        canvas.style.height = (CONFIG.CANVAS.HEIGHT * scale) + 'px';
      }
      scaleCanvas();
      window.addEventListener('resize', scaleCanvas);

      function getScale() {
        return parseFloat(canvas.style.width) / CONFIG.CANVAS.WIDTH;
      }

      Input.init(canvas, getScale);

      // ── SCENE MANAGER ──
      let currentScene = null;
      let rafId = null;
      let lastTime = 0;

      function startLoop(scene) {
        if (currentScene && currentScene.destroy) currentScene.destroy();
        currentScene = scene;
        if (rafId) cancelAnimationFrame(rafId);
        lastTime = 0;
        function loop(ts) {
          const dt = Math.min((ts - (lastTime || ts)) / 1000, 0.05);
          lastTime = ts;
          if (currentScene.update) currentScene.update(dt);
          currentScene.draw(ctx);
          rafId = requestAnimationFrame(loop);
        }
        rafId = requestAnimationFrame(loop);
      }

      function showMenu() {
        if (currentScene && currentScene.destroy) currentScene.destroy();
        const menu = new MenuScene(canvas, ctx, (mode) => {
          menu.destroy();
          startGame(mode);
        });
        startLoop(menu);
      }

      function showMissionBrief(attackNum, onComplete) {
        const brief = new MissionBriefScene(canvas, ctx, attackNum, () => {
          onComplete();
        });
        startLoop(brief);
      }

      function startGame(mode) {

        function launchScene() {
          let gameScene = null;

          // Pause handler — captures frozen frame, shows PauseScene
          function onPause() {
            const snap = document.createElement('canvas');
            snap.width  = CONFIG.CANVAS.WIDTH;
            snap.height = CONFIG.CANVAS.HEIGHT;
            snap.getContext('2d').drawImage(canvas, 0, 0);

            const gs = {
              mode:      gameScene.mode,
              attackNum: gameScene.attackNum,
              waveNum:   gameScene.waveNum,
              kills:     gameScene.kills,
              points:    gameScene.points,
              timeElapsed: gameScene.timeElapsed,
            };

            const pause = new PauseScene(canvas, ctx, snap, gs,
              // Resume
              () => {
                pause.destroy();
                gameScene._destroyed = false;
                gameScene._bindInput();
                startLoop(gameScene);
              },
              // Restart
              () => {
                pause.destroy();
                gameScene.destroy();
                startGame(mode);
              },
              // Exit
              () => {
                pause.destroy();
                gameScene.destroy();
                showMenu();
              }
            );
            startLoop(pause);
          }

          gameScene = new GameScene(
            canvas, ctx, mode,
            // onGameOver
            (stats) => {
              if (currentScene && currentScene.destroy) currentScene.destroy();
              if (stats.restart) { startGame(mode); return; }
              if (stats.exit)    { showMenu(); return; }
              const go = new GameOverScene(canvas, ctx, stats,
                () => { go.destroy(); startGame(mode); },
                () => { go.destroy(); showMenu(); }
              );
              startLoop(go);
            },
            // onPitstop
            (gameState) => {
              if (currentScene && currentScene.destroy) currentScene.destroy();
              const aar = new AARScene(canvas, ctx, gameState, () => {
                aar.destroy();
                const shop = new UpgradeStationScene(canvas, ctx, gameState, () => {
                  shop.destroy();
                  const nextAttack = gameState.attackNum + 1;
                  showMissionBrief(nextAttack, () => {
                    gameScene.points = gameState.points;
                    gameScene.player = gameState.player;
                    gameScene._loadAttack(nextAttack);
                    gameScene.enemies = [];
                    gameScene.projectiles = [];
                    gameScene.explosions = [];
                    gameScene._destroyed = false;
                    gameScene._bindInput();
                    startLoop(gameScene);
                  });
                });
                startLoop(shop);
              });
              startLoop(aar);
            },
            // onPause
            onPause
          );
          startLoop(gameScene);
        }

        if (mode === 'campaign') {
          showMissionBrief(1, () => launchScene());
        } else {
          launchScene();
        }
      }

      // Boot
      showMenu();
    });
  </script>
</body>
</html>
